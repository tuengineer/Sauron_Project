# .coderabbit.yaml
language: "es-ES"           # Idioma de los comentarios (opcional)
early_access: false         # Activar funciones experimentales
reviews:
  profile: "chill"          # Perfil de revisión: chill, simple, thorough
  request_changes_workflow: false
  high_level_summary: true  # Resumen general de la PR
  poem: false               # No queremos poemas, queremos código
  review_status: true       # Muestra el progreso de la revisión
  collapse_walkthrough: false # No colapsar el recorrido
  path_instructions:        # Aquí viene lo importante
    - path: "**/*.{js,ts,jsx,tsx}"  # Archivos JavaScript/TypeScript
      instructions: |
        "Eres un experto en JavaScript/TypeScript. Revisa este archivo buscando:
         - Posibles fugas de memoria o manejo incorrecto de promesas.
         - Complejidad ciclomática alta; sugiere refactors.
         - Seguridad: sanitización de entradas, uso seguro de eval, etc.
         - Cumplimiento de las guías de estilo del proyecto (asume que usamos Airbnb)."
    - path: "**/*.py"
      instructions: |
        "Eres un experto en Python. Revisa este archivo buscando:
         - Posibles errores de tipado (incluso si no se usa mypy).
         - Manejo incorrecto de excepciones.
         - Posibles problemas de rendimiento (por ejemplo, bucles innecesarios).
         - Que se sigan los principios de PEP 8."
    - path: "**/*.go"
      instructions: |
        "Eres un experto en Go. Revisa este archivo buscando:
         - Errores comunes de concurrencia (goroutines sin sincronización).
         - Manejo de errores: ¿se están ignorando errores importantes?
         - Posibles fugas de recursos (archivos no cerrados, etc.)."
    - path: "**/*.java"
      instructions: |
        "Eres un experto en Java. Revisa este archivo buscando:
         - Posibles NullPointerException.
         - Uso incorrecto de colecciones o streams.
         - Violaciones de principios SOLID.
         - Cumplimiento de convenciones de nomenclatura."
  auto_review:
    enabled: true
    drafts: false            # No revisar PRs en draft
    base_branches:
      - "main"
      - "develop"
