language: "es-ES"
early_access: false
reviews:
  profile: "thorough"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_instructions:
    - path: "**/*.{js,ts,jsx,tsx}"
      instructions: |
        "Revisa este archivo JavaScript/TypeScript como si fueras un arquitecto senior.
        - Analiza la complejidad ciclomática y sugiere dividir funciones grandes.
        - Busca patrones que puedan causar memory leaks (ej. event listeners no removidos).
        - Verifica que las promesas tengan catch o se manejen con try/catch en async/await.
        - Señala cualquier uso inseguro de any (en TypeScript).
        - Comprueba que las importaciones no tengan dependencias circulares."
    - path: "**/*.py"
      instructions: |
        "Revisa este archivo Python con ojo crítico.
        - Identifica funciones o métodos que puedan beneficiarse de type hints.
        - Busca bloques try/except demasiado amplios que puedan ocultar errores.
        - Sugiere el uso de generadores para mejorar rendimiento en bucles grandes.
        - Detecta posibles problemas de concurrencia si se usa threading o asyncio."
    - path: "**/*.{html,css,scss}"
      instructions: |
        "Revisa este archivo de estilos/marcado.
        - Busca selectores CSS demasiado específicos que dificulten el mantenimiento.
        - En HTML, verifica la accesibilidad (etiquetas alt, roles ARIA cuando sea necesario).
        - Sugiere usar variables CSS para valores repetidos."
    - path: "**/*"  # Resto de archivos (configuración, etc.)
      instructions: |
        "Revisa este archivo de configuración o documento. # @coderabbitai Revisa la arquitectura general de este proyecto y sugiere mejoras.
        - Verifica que no contenga secretos o credenciales.
        - Comprueba que la sintaxis sea correcta según el formato (JSON, YAML, etc.).
        - Sugiere mejoras de legibilidad o buenas prácticas."
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "develop"
